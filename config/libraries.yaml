# ── Library definitions ──────────────────────────────────────────────
#
# Each library has a name (shown in destination picker), a type, and a root path.
#
# type: series  → episodes with SxxExx naming, asks for season number
# type: movie   → standalone file, "Title (Year).ext" naming
#
# Add or remove entries as needed. Restart the bot after editing.

libraries:
  - name: "TV Shows"
    type: series
    root: /media/storage/data/media/tv

  - name: "Movies"
    type: movie
    root: /media/storage/data/media/movies

  - name: "Anime"
    type: series
    root: /media/storage/data/media/anime

# ── Download settings ───────────────────────────────────────────────

download:
  # tdl download template. {url} and {dir} are filled at runtime.
  tdl_template: 'tdl dl -u {url} -d "{dir}" -t 16 -l 9 --reconnect-timeout 0
    --template "{{ .FileName }}"'
  # Optional: dedicated TDL session directory to avoid DB locks with other clients.
  # tdl_home: /data/tdl
