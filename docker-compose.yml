services:
  plexbot:
    build: .
    env_file:
      - config/.env
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./config:/app/config:ro
      - ./data:/data
      # Mount your media libraries. Paths must match config/libraries.yaml roots.
      # Example: /host/path/to/tv:/media/tv
    restart: unless-stopped
